<!DOCTYPE html>
<html>
<head>
    <title>Simple Login Test</title>
</head>
<body>
    <h2>CollabFlow Login Test</h2>
    <input type="email" id="email" placeholder="Email" value="test@collabflow.com">
    <input type="password" id="password" placeholder="Password" value="test123">
    <button onclick="login()">Login</button>
    <pre id="result"></pre>

    <script>
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            document.getElementById('result').innerText = 'Sending request to /api/auth/login...';
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, password: password })
                });
                
                const data = await response.json();
                document.getElementById('result').innerText = JSON.stringify(data, null, 2);
                
                if (response.ok) {
                    alert('Login Successful! Token: ' + data.token.substring(0, 50));
                } else {
                    alert('Login Failed: ' + (data.message || 'Unknown error'));
                }
            } catch (error) {
                document.getElementById('result').innerText = 'Error: ' + error.message;
                alert('Error: ' + error.message);
            }
        }
    </script>
</body>
</html>
