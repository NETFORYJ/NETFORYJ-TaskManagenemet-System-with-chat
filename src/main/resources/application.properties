# ========================================
# COLLABFLOW - APPLICATION CONFIGURATION
# ========================================

# Server Configuration
server.port=8080
server.servlet.context-path=/

# ========================================
# DATABASE CONFIGURATION (MySQL Workbench)
# ========================================
spring.datasource.url=jdbc:mysql://localhost:3306/collabflow_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Priya@1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ========================================
# JWT CONFIGURATION
# ========================================
jwt.secret=
jwt.expiration=86400000
jwt.refresh.expiration=604800000
spring.web.resources.static-locations=classpath:/static/,file:./uploads/

spring.servlet.multipart.location=./uploads/

# ========================================
# GOOGLE OAUTH2 CONFIGURATION (Optional)
# Uncomment when you get credentials from Google Cloud Console
# ========================================
spring.security.oauth2.client.registration.google.client-id=
spring.security.oauth2.client.registration.google.client-secret=
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub


# ========================================
# LOGGING
# ========================================
logging.level.com.collabflow=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ========================================
# FILE UPLOAD (for task attachments - optional)
# ========================================
# File upload settings
spring.servlet.multipart.max-file-size=300MB
spring.servlet.multipart.max-request-size=300MB

# Logging Configuration
logging.level.com.yjnet.CollabFlow=DEBUG
logging.level.org.springframework.messaging=DEBUG
logging.level.org.springframework.web.socket=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n